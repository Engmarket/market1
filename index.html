<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG MARKET - السوق الهندسي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

:root{
--main:#002f34;
--accent:#ff6f00;
--bg:#f2f4f5;
--white:#fff;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--main);
padding-bottom:90px;
}

header{
background:#fff;
display:flex;
justify-content:space-between;
padding:15px 5%;
border-bottom:1px solid #ddd;
}

.logo{font-weight:900;font-size:1.5rem;}

select,input,textarea{
width:100%;
padding:10px;
margin:6px 0;
}

button{
background:var(--main);
color:#fff;
border:none;
padding:10px;
cursor:pointer;
}

.section{
padding:20px 5%;
background:#fff;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.badge{
background:var(--accent);
color:#fff;
padding:3px 8px;
font-size:12px;
border-radius:3px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
border-top:1px solid #ddd;
padding:10px 0;
}

.nav-item{
text-align:center;
font-size:12px;
text-decoration:none;
color:var(--main);
}

.nav-item i{
display:block;
font-size:18px;
margin-bottom:4px;
}

</style>
</head>

<body>

<header>
<div class="logo">ENG MARKET</div>
</header>

<!-- إنشاء طلب عرض سعر -->
<div class="section">
<h3>طلب عرض سعر</h3>

<select id="region">
<option value="">اختر المحافظة</option>
<option value="بيروت">بيروت</option>
<option value="الشمال">الشمال</option>
<option value="البقاع">البقاع</option>
<option value="الجنوب">الجنوب</option>
<option value="جبل لبنان">جبل لبنان</option>
</select>

<select id="category">
<option value="">اختر الفئة</option>
<option value="حديد">حديد</option>
<option value="خشب">خشب</option>
<option value="كهرباء">كهرباء</option>
<option value="صحي">صحي</option>
</select>

<input type="text" id="product" placeholder="مثال: 5 طن حديد B500">

<textarea id="details" placeholder="تفاصيل إضافية..."></textarea>

<button onclick="sendRequest()">إرسال الطلب للشركات</button>
</div>

<!-- قائمة الشركات -->
<div class="section">
<h3>الشركات المطابقة</h3>
<div class="grid" id="companiesList"></div>
</div>

<!-- العروض -->
<div class="section">
<h3>العروض المستلمة</h3>
<div class="grid" id="offersList"></div>
</div>

<div class="bottom-nav">
<a href="#" class="nav-item"><i class="fas fa-home"></i>الرئيسية</a>
<a href="#" class="nav-item"><i class="fas fa-plus-circle"></i>طلب</a>
<a href="#" class="nav-item"><i class="fas fa-tags"></i>العروض</a>
<a href="#" class="nav-item"><i class="fas fa-user"></i>حسابي</a>
</div>

<script>

/* بيانات تجريبية (لاحقاً تصبح من قاعدة بيانات) */

const companies = [
{name:"شركة ميتالكو",category:"حديد",region:"بيروت"},
{name:"حديد الشمال",category:"حديد",region:"الشمال"},
{name:"خشب البقاع",category:"خشب",region:"البقاع"},
{name:"كهرباء الجنوب",category:"كهرباء",region:"الجنوب"},
{name:"حديد لبنان",category:"حديد",region:"جبل لبنان"}
];

function sendRequest(){

let region=document.getElementById("region").value;
let category=document.getElementById("category").value;
let product=document.getElementById("product").value;

let filtered=companies.filter(c=>c.region===region && c.category===category);

let list=document.getElementById("companiesList");
list.innerHTML="";

filtered.forEach(c=>{
list.innerHTML+=`
<div class="card">
<h4>${c.name}</h4>
<p>${c.category} - ${c.region}</p>
<button onclick="makeOffer('${c.name}','${product}')">إرسال عرض</button>
</div>
`;
});

if(filtered.length===0){
list.innerHTML="<p>لا توجد شركات مطابقة</p>";
}

}

function makeOffer(company,product){

let price=(Math.random()*1000+500).toFixed(0);

document.getElementById("offersList").innerHTML+=`
<div class="card">
<span class="badge">${company}</span>
<p>عرض سعر لـ: ${product}</p>
<h4>$${price}</h4>
<button onclick="this.parentElement.remove()">اختيار هذا العرض</button>
</div>
`;

}

</script>

</body>
</html>
