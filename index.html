<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eng Market | المنصة الهندسية الشاملة</title>
    <style>
        :root { --primary: #0d1b2a; --brand: #c5a059; --bg: #f4f7f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; transition: 0.3s; }
        
        /* إخفاء شريط جوجل الافتراضي العلوي */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }

        header { background: var(--primary); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--brand); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--brand); text-decoration: none; }
        
        /* زر اللغة الجديد */
        .lang-container { background: var(--brand); color: var(--primary); padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        #google_translate_element { display: none; } /* نخفي الأداة الأصلية ونشغلها بالزر الخاص بنا */

        .hero { width: 100%; height: 250px; background: #000 url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=800') center/cover; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero h2 { color: var(--brand); text-align: center; z-index: 2; text-shadow: 2px 2px 10px #000; padding: 0 20px; }

        .search-area { background: var(--white); padding: 20px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #mainSearch { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; outline: none; box-sizing: border-box; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: var(--white); border-radius: 12px; padding: 20px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin: 10px 0; color: var(--primary); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; text-align: center; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .btn-wa { background: #25d366; color: white; }
        .btn-call { background: var(--primary); color: white; }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--primary); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--brand); z-index: 2000; }
        .nav-item { color: white; text-decoration: none; text-align: center; font-size: 0.8rem; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ENG MARKET</a>
    <div class="lang-container" onclick="triggerGoogleTranslate()">
        🌐 <span id="langText">English</span>
    </div>
</header>

<div id="google_translate_element"></div>

<div class="hero">
    <h2>أسعار مواد البناء والخدمات الهندسية لحظة بلحظة</h2>
</div>

<div class="search-area">
    <input type="text" id="mainSearch" onkeyup="search()" placeholder="ابحث عن شركة، مصنع، أو خدمة...">
</div>

<div class="grid" id="companyGrid">
    </div>

<div class="bottom-nav">
    <a href="#" class="nav-item">🏠<br>الرئيسية</a>
    <a href="https://wa.me/96170822806" class="nav-item">👤<br>حسابي</a>
    <a href="tel:96170822806" class="nav-item">📞<br>اتصل بنا</a>
</div>

<script>
    const companies = [
        { n: "ميتالكو للحديد", c: "حديد بناء", l: "بيروت", p: "96103761784", d: "مورد أساسي لكافة قياسات الحديد بجودة عالمية." },
        { n: "المقاولون اللبنانيون", c: "باطون جاهز", l: "الجنوب", p: "96170822806", d: "خدمات صب وخلط الباطون بأحدث المعدات." },
        { n: "تكنو لايت للكهرباء", c: "أنظمة طاقة", l: "الشمال", p: "96101000000", d: "متخصصون في الطاقة الشمسية والتمديدات الكهربائية." }
    ];

    function render(data) {
        document.getElementById('companyGrid').innerHTML = data.map(c => `
            <div class="card">
                <small style="color:var(--brand)">📍 ${c.l} | ${c.c}</small>
                <h3>${c.n}</h3>
                <p style="font-size:0.85rem; color:#666;">${c.d}</p>
                <div class="btn-group">
                    <a href="tel:${c.p}" class="btn btn-call">اتصال</a>
                    <a href="https://wa.me/${c.p}" class="btn btn-wa">واتساب</a>
                </div>
            </div>
        `).join('');
    }

    function search() {
        const val = document.getElementById('mainSearch').value.toLowerCase();
        render(companies.filter(c => c.n.includes(val) || c.c.includes(val)));
    }

    // تشغيل ترجمة جوجل
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ar',
            includedLanguages: 'en,ar',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }

    function triggerGoogleTranslate() {
        const select = document.querySelector('.goog-te-combo');
        if (select) {
            const currentLang = document.getElementById('langText').innerText;
            select.value = currentLang === 'English' ? 'en' : 'ar';
            select.dispatchEvent(new Event('change'));
            document.getElementById('langText').innerText = currentLang === 'English' ? 'العربية' : 'English';
        }
    }

    window.onload = () => render(companies);
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
