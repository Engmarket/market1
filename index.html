<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG MARKET PRO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--main:#002f34;
--accent:#ff6f00;
--light:#f2f4f5;
--white:#fff;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--light);
color:var(--main);
}

header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
}

.section{
background:#fff;
padding:20px;
margin:15px;
border-radius:6px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:var(--main);
color:#fff;
padding:10px;
border:none;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
margin-top:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.badge{
background:var(--accent);
color:#fff;
padding:3px 6px;
font-size:12px;
border-radius:3px;
}

.slider{
background:#ffe082;
padding:15px;
text-align:center;
font-weight:bold;
}

</style>
</head>
<body>

<header>
<h2>ENG MARKET</h2>
<button onclick="showSection('register')">تسجيل</button>
</header>

<div class="slider" id="adsSlider">
إعلان مدفوع - هنا تظهر إعلانات الشركات
</div>

<div class="section" id="register">
<h3>تسجيل مستخدم</h3>
<select id="userType">
<option value="engineer">مهندس</option>
<option value="contractor">مقاول</option>
<option value="company">شركة</option>
</select>
<input type="text" id="name" placeholder="الاسم">
<select id="region">
<option>بيروت</option>
<option>الشمال</option>
<option>البقاع</option>
<option>الجنوب</option>
<option>جبل لبنان</option>
</select>
<select id="category">
<option>حديد</option>
<option>خشب</option>
<option>بلاط</option>
<option>دهان</option>
<option>كهرباء</option>
</select>
<button onclick="registerUser()">تسجيل</button>
</div>

<div class="section">
<h3>طلب عرض سعر</h3>
<input type="text" id="product" placeholder="مثال: 5 طن حديد B500">
<textarea id="details" placeholder="تفاصيل إضافية"></textarea>
<button onclick="createRequest()">إرسال الطلب</button>
</div>

<div class="section">
<h3>الشركات المطابقة</h3>
<div class="grid" id="companiesList"></div>
</div>

<div class="section">
<h3>العروض</h3>
<div class="grid" id="offersList"></div>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let requests = [];
let offers = [];

function registerUser(){
let user={
type:document.getElementById("userType").value,
name:document.getElementById("name").value,
region:document.getElementById("region").value,
category:document.getElementById("category").value
};

users.push(user);
localStorage.setItem("users",JSON.stringify(users));
alert("تم التسجيل بنجاح");
displayCompanies();
}

function displayCompanies(){
let list=document.getElementById("companiesList");
list.innerHTML="";
users.filter(u=>u.type==="company").forEach(c=>{
list.innerHTML+=`
<div class="card">
<h4>${c.name}</h4>
<p>${c.category} - ${c.region}</p>
<button onclick="makeOffer('${c.name}')">إرسال عرض</button>
</div>
`;
});
}

function createRequest(){
let req={
product:document.getElementById("product").value,
details:document.getElementById("details").value
};
requests.push(req);
alert("تم إرسال الطلب");
}

function makeOffer(company){
let price=(Math.random()*1000+500).toFixed(0);
offers.push({company,price});
document.getElementById("offersList").innerHTML+=`
<div class="card">
<span class="badge">${company}</span>
<h4>$${price}</h4>
<button onclick="this.parentElement.remove()">اختيار العرض</button>
</div>
`;
}

displayCompanies();

</script>

</body>
</html>
