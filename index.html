<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eng Market | سوق المهندسين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان المستوحاة من Olx (أبيض ورمادي فاتح) */
        :root {
            --primary-blue: #002f34; /* لون النص الأساسي في اوليكس */
            --gold: #c5a059;
            --bg-white: #ffffff;
            --light-gray: #f2f4f5;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--light-gray); color: var(--primary-blue); padding-bottom: 70px; }
        
        /* البورصة بلون هادئ */
        .market-ticker { background: var(--primary-blue); color: #fff; padding: 10px 0; overflow: hidden; font-size: 0.85rem; }
        .ticker-content { display: flex; white-space: nowrap; animation: moveTicker 40s linear infinite; }
        .ticker-item { margin: 0 20px; }
        @keyframes moveTicker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الهيدر أبيض بالكامل */
        header { background: var(--bg-white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; }
        .logo { color: var(--primary-blue); font-size: 1.8rem; font-weight: bold; text-decoration: none; }
        .btn-lang { background: var(--primary-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* العرض المميز */
        .hot-deals { background: #fff3e0; color: #e65100; text-align: center; padding: 8px; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #ffe0b2; }

        /* منطقة البحث */
        .search-container { background: var(--bg-white); padding: 40px 5%; text-align: center; }
        #mainSearch { width: 100%; max-width: 800px; padding: 15px 25px; border-radius: 4px; border: 2px solid var(--primary-blue); font-size: 1.1rem; outline: none; }

        /* أيقونات الخدمات */
        .services-icons { display: flex; overflow-x: auto; padding: 20px 5%; gap: 20px; background: var(--bg-white); }
        .service-item { min-width: 90px; text-align: center; cursor: pointer; color: var(--primary-blue); }
        .service-item i { font-size: 1.5rem; display: block; margin-bottom: 8px; color: var(--primary-blue); }
        .service-item span { font-size: 0.8rem; font-weight: bold; }

        /* كروت الشركات (أبيض ناصع) */
        .main-grid { padding: 20px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--bg-white); border-radius: 4px; border: 1px solid #ddd; overflow: hidden; transition: 0.2s; position: relative; }
        .card:hover { border-color: var(--primary-blue); }
        .card-body { padding: 15px; }
        .tag { background: #e1f5fe; color: #0288d1; padding: 2px 8px; border-radius: 2px; font-size: 0.7rem; font-weight: bold; }
        .card h3 { margin: 10px 0; font-size: 1.2rem; }
        .card p { font-size: 0.9rem; color: #555; height: 40px; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-act { flex: 1; text-align: center; padding: 10px; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .wa { background: #25d366; color: white; }
        .call { border: 2px solid var(--primary-blue); color: var(--primary-blue); }

        /* نافذة إضافة الإعلان */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-white); border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-link { color: var(--primary-blue); text-decoration: none; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="market-ticker">
    <div class="ticker-content">
        <div class="ticker-item">⛽ بنزين: 1,650,000 L.L</div>
        <div class="ticker-item">🏗️ طن الحديد: $685</div>
        <div class="ticker-item">🧱 المازوت: $14.50</div>
        <div class="ticker-item">💰 الذهب: $78.40</div>
    </div>
</div>

<header>
    <a href="#" class="logo">ENG MARKET</a>
    <button class="btn-lang" onclick="alert('Switching Language...')">English</button>
</header>

<div class="hot-deals">🔥 عروض اليوم: خصم 20% على مواد العزل والنش!</div>

<div class="search-container">
    <input type="search" id="mainSearch" placeholder="ابحث عن شركة، مادة بناء، أو خدمة...">
</div>

<div class="services-icons">
    <div class="service-item"><i class="fas fa-bars-staggered"></i><span>حديد</span></div>
    <div class="service-item"><i class="fas fa-truck-ramp-box"></i><span>باطون</span></div>
    <div class="service-item"><i class="fas fa-bolt"></i><span>كهرباء</span></div>
    <div class="service-item"><i class="fas fa-droplet"></i><span>عزل ونش</span></div>
    <div class="service-item"><i class="fas fa-tractor"></i><span>معدات</span></div>
</div>

<div class="main-grid" id="grid">
    <div class="card">
        <div class="card-body">
            <span class="tag">موثوق ✅</span>
            <h3>ميتالكو للحديد</h3>
            <p>كافة أنواع حديد التسليح والجسور والشبك.</p>
            <div class="actions">
                <a href="#" class="btn-act wa">واتساب</a>
                <a href="#" class="btn-act call">اتصال</a>
            </div>
        </div>
    </div>
    </div>

<div class="bottom-nav">
    <a href="#" class="nav-link">🏠<br>الرئيسية</a>
    <a href="#" class="nav-link" style="color: #ff5252;">➕<br>أضف إعلان</a>
    <a href="#" class="nav-link">📞<br>اتصل بنا</a>
</div>

</body>
</html>
