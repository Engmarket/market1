 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eng Market | سوق المهندسين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تعريف الهوية البصرية (أبيض + كحلي أوليكس) */
        :root {
            --primary: #002f34;
            --accent: #ff6f00;
            --bg: #ffffff;
            --gray-light: #f2f4f5;
            --whatsapp: #25d366;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--gray-light); color: var(--primary); padding-bottom: 80px; }

        /* 1. البورصة المتحركة */
        .market-ticker { background: #1a1a1a; color: #fff; padding: 12px 0; overflow: hidden; border-bottom: 2px solid var(--accent); }
        .ticker-track { display: flex; white-space: nowrap; animation: slide 30s linear infinite; }
        .ticker-item { margin: 0 30px; font-weight: bold; font-size: 0.9rem; }
        .ticker-item span { color: var(--accent); margin-right: 5px; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 2. الهيدر الرئيسي */
        header { background: var(--bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.7rem; font-weight: 900; letter-spacing: -1px; text-decoration: none; color: var(--primary); }
        .btn-post { background: var(--primary); color: #fff; padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }

        /* 3. شريط البحث والتصنيفات */
        .search-section { background: var(--bg); padding: 25px 5%; border-bottom: 1px solid var(--border); text-align: center; }
        #searchInput { width: 100%; max-width: 800px; padding: 15px 20px; border: 2px solid var(--primary); border-radius: 8px; font-size: 1rem; outline: none; }

        .categories { display: flex; overflow-x: auto; padding: 20px 5%; gap: 25px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .cat-box { text-align: center; min-width: 75px; cursor: pointer; color: var(--primary); transition: 0.2s; }
        .cat-box i { font-size: 1.5rem; display: block; margin-bottom: 10px; opacity: 0.8; }
        .cat-box span { font-size: 0.8rem; font-weight: bold; }
        .cat-box:hover { color: var(--accent); }

        /* 4. شبكة الشركات والنتائج */
        .main-container { padding: 20px 5%; max-width: 1200px; margin: auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-header h2 { font-size: 1.2rem; margin: 0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .company-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; position: relative; transition: 0.3s; }
        .company-card:hover { border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .verified-badge { position: absolute; top: 10px; left: 10px; background: #00b4d8; color: #fff; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px; font-weight: bold; }
        .company-card h3 { margin: 10px 0 5px 0; font-size: 1.2rem; }
        .company-card p { font-size: 0.85rem; color: #666; margin: 5px 0 15px 0; line-height: 1.4; }

        .btn-group { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 10px; text-align: center; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .btn-call { border: 2px solid var(--primary); color: var(--primary); }
        .btn-wa { background: var(--whatsapp); color: #fff; }

        /* 5. نموذج "أضف شركتك" */
        .add-form { background: var(--bg); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 30px; display: none; }
        .add-form input, .add-form select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 4px; }

        /* 6. القائمة السفلية للجوال */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: var(--primary); text-decoration: none; text-align: center; font-size: 0.75rem; font-weight: bold; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="market-ticker">
    <div class="ticker-track">
        <div class="ticker-item">🏗️ طن الحديد: <span>$685</span></div>
        <div class="ticker-item">⛽ بنزين 95: <span>1,640,000 LL</span></div>
        <div class="ticker-item">🧱 كيس إسمنت: <span>$8.20</span></div>
        <div class="ticker-item">🔥 مازوت (20L): <span>$14.50</span></div>
        <div class="ticker-item">💰 الذهب (24k): <span>$78.40</span></div>
        <div class="ticker-item">⚪ الفضة: <span>$0.95</span></div>
    </div>
</div>

<header>
    <a href="#" class="logo">ENG MARKET</a>
    <button class="btn-post" onclick="toggleForm()">+ أضف إعلان</button>
</header>

<div class="search-section">
    <input type="text" id="searchInput" placeholder="ابحث عن مورد، مادة، أو خدمة..." onkeyup="handleSearch()">
</div>

<div class="categories">
    <div class="cat-box" onclick="filterBy('حديد')"><i class="fas fa-bars-staggered"></i><span>حديد</span></div>
    <div class="cat-box" onclick="filterBy('باطون')"><i class="fas fa-truck-pickup"></i><span>باطون</span></div>
    <div class="cat-box" onclick="filterBy('كهرباء')"><i class="fas fa-bolt"></i><span>كهرباء</span></div>
    <div class="cat-box" onclick="filterBy('صحي')"><i class="fas fa-faucet"></i><span>صحي</span></div>
    <div class="cat-box" onclick="filterBy('عزل')"><i class="fas fa-shield-halved"></i><span>عزل ونش</span></div>
    <div class="cat-box" onclick="filterBy('مقاولات')"><i class="fas fa-hammer"></i><span>مقاولات</span></div>
</div>

<div class="main-container">
    
    <div class="add-form" id="companyForm">
        <h3>تسجيل شركة / إعلان جديد</h3>
        <input type="text" id="fName" placeholder="اسم الشركة أو المعلن">
        <select id="fCat">
            <option value="حديد">حديد</option>
            <option value="باطون">باطون</option>
            <option value="كهرباء">كهرباء</option>
            <option value="صحي">صحي</option>
            <option value="عزل">عزل ونش</option>
        </select>
        <input type="text" id="fPhone" placeholder="رقم الواتساب (مثال: 96170000000)">
        <button class="btn-post" style="width:100%" onclick="saveCompany()">نشر الإعلان الآن</button>
    </div>

    <div class="section-header">
        <h2>أحدث الشركات المسجلة</h2>
        <span id="resCount" style="font-size:0.8rem; color:#666;"></span>
    </div>

    <div class="grid" id="companiesGrid">
        </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i>الرئيسية</a>
    <a href="#" onclick="toggleForm()" class="nav-item"><i class="fas fa-plus-circle"></i>أضف إعلان</a>
    <a href="https://wa.me/96170822806" class="nav-item"><i class="fas fa-headset"></i>الدعم</a>
    <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>حسابي</a>
</div>

<script>
    // بيانات تجريبية أولية (بإمكانك استبدالها لاحقاً)
    let db = JSON.parse(localStorage.getItem('eng_market_db')) || [
        {name: "ميتالكو للحديد", cat: "حديد", phone: "96103000000", v: true, loc: "بيروت"},
        {name: "يونايتد كونكريت", cat: "باطون", phone: "96170000000", v: true, loc: "صيدا"},
        {name: "تكنو لايت", cat: "كهرباء", phone: "96101000000", v: false, loc: "طرابلس"}
    ];

    function render(data) {
        const grid = document.getElementById('companiesGrid');
        grid.innerHTML = data.map(item => `
            <div class="company-card">
                ${item.v ? '<span class="verified-badge">موثق ✅</span>' : ''}
                <h3>${item.name}</h3>
                <p>التخصص: ${item.cat} <br> المنطقة: ${item.loc || 'لبنان'}</p>
                <div class="btn-group">
                    <a href="tel:${item.phone}" class="btn-action btn-call">اتصال</a>
                    <a href="https://wa.me/${item.phone}" class="btn-action btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                </div>
            </div>
        `).join('');
        document.getElementById('resCount').innerText = `${data.length} شركة متاحة`;
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = db.filter(i => i.name.toLowerCase().includes(query) || i.cat.includes(query));
        render(filtered);
    }

    function filterBy(cat) {
        const filtered = db.filter(i => i.cat === cat);
        render(filtered);
    }

    function toggleForm() {
        const f = document.getElementById('companyForm');
        f.style.display = f.style.display === 'block' ? 'none' : 'block';
        f.scrollIntoView({behavior: "smooth"});
    }

    function saveCompany() {
        const name = document.getElementById('fName').value;
        const cat = document.getElementById('fCat').value;
        const phone = document.getElementById('fPhone').value;

        if(name && phone) {
            db.unshift({name, cat, phone, v: false, loc: "مسجل حديثاً"});
            localStorage.setItem('eng_market_db', JSON.stringify(db));
            render(db);
            toggleForm();
            alert("تم إرسال إعلانك للمراجعة والنشر!");
        } else {
            alert("يرجى ملء جميع الخانات!");
        }
    }

    // التشغيل الأول
    render(db);
</script>

</body>
</html>
